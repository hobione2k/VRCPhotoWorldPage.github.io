<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VRCPhotoWorldPage</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: sans-serif;
      background: #f7f7f7;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      user-select: none;
    }

    #dropOverlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 120, 215, 0.08);
      border: 4px dashed transparent;
      box-sizing: border-box;
      transition: background 0.15s, border-color 0.15s;
      pointer-events: none;
    }

    #dropOverlay.dragover {
      background: rgba(0, 120, 215, 0.16);
      border-color: #0078d7;
    }

    #content {
      text-align: center;
      padding: 24px;
    }

    #title {
      font-size: 28px;
      margin-bottom: 12px;
    }

    #subtitle {
      font-size: 16px;
      color: #666;
      margin-bottom: 16px;
    }

    #note {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      text-align: left;
      display: inline-block;
    }

    #message {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%);
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      font-size: 14px;
      white-space: pre-wrap;
      text-align: left;
    }

    #message:empty {
      display: none;
    }

    footer {
      position: fixed;
      left: 50%;
      bottom: 15px;
      transform: translateX(-50%);
      font-size: 12px;
      color: #666;
      text-align: center;
      user-select: text;
    }

    footer a {
      color: #0078d7;
      text-decoration: none;
      margin: 0 8px;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div id="dropOverlay"></div>

  <div id="content">
    <div id="title">VRChatの写真をドラッグ&ドロップ</div>
    <div id="subtitle">撮影したワールドページを開きます</div>
    <div id="note">ブラウザ上でローカル動作します</div>
  </div>

  <div id="message"></div>

   <footer>
    <a href="https://github.com/hobione2k/VRCPhotoWorldPage.github.io" target="_blank" rel="noopener noreferrer">Repository</a>
    |
    <a href="https://github.com/hobione2k/VRCPhotoWorldPage.github.io/blob/main/LICENSE" target="_blank" rel="noopener noreferrer">License</a>
  </footer>

  <script>
    const VRCHAT_WORLD_URL_FORMAT = "https://vrchat.com/home/world/{}/info";

    const dropOverlay = document.getElementById("dropOverlay");
    const message = document.getElementById("message");

    let dragCounter = 0;

    function setMessage(text) {
      message.textContent = text;
    }

    function isPNGFile(file) {
      const isPngMime = file.type === "image/png";
      const isPngExt = file.name.toLowerCase().endsWith(".png");
      return isPngMime || isPngExt;
    }

    async function loadXMPFromPNG(file) {
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      let text = "";
      for (let i = 0; i < bytes.length; i++) {
        text += String.fromCharCode(bytes[i]);
      }

      const startTag = "<x:xmpmeta";
      const endTag = "</x:xmpmeta>";

      const start = text.indexOf(startTag);
      if (start === -1) {
        return null;
      }

      const end = text.indexOf(endTag, start);
      if (end === -1) {
        return null;
      }

      return text.slice(start, end + endTag.length);
    }

    function getWorldIDFromXMP(xmpString) {
      if (!xmpString) {
        return null;
      }

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmpString, "application/xml");
      const parserError = xmlDoc.querySelector("parsererror");
      if (parserError) {
        return null;
      }

      const elements = xmlDoc.getElementsByTagName("*");
      for (const elem of elements) {
        const tagName = elem.tagName || "";
        if (tagName.endsWith("WorldID")) {
          return elem.textContent?.trim() || null;
        }
      }

      return null;
    }

    async function getWorldIDFromFile(file) {
      const xmpString = await loadXMPFromPNG(file);
      if (!xmpString) {
        return null;
      }
      return getWorldIDFromXMP(xmpString);
    }

    function openWorldPage(worldID) {
      const url = VRCHAT_WORLD_URL_FORMAT.replace("{}", worldID);
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function showDragOverlay() {
      dropOverlay.classList.add("dragover");
    }

    function hideDragOverlay() {
      dropOverlay.classList.remove("dragover");
    }

    window.addEventListener("dragenter", (e) => {
      e.preventDefault();
      dragCounter++;
      showDragOverlay();
      setMessage("");
    });

    window.addEventListener("dragover", (e) => {
      e.preventDefault();
      showDragOverlay();
    });

    window.addEventListener("dragleave", (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dragCounter = 0;
        hideDragOverlay();
      }
    });

    window.addEventListener("drop", async (e) => {
      e.preventDefault();
      dragCounter = 0;
      hideDragOverlay();

      const files = Array.from(e.dataTransfer.files);
      if (files.length === 0) {
        setMessage("ファイルがありません。");
        return;
      }

      const uniqueWorldIDs = new Set();
      const errors = [];

      for (const file of files) {
        if (!isPNGFile(file)) {
          errors.push(`${file.name}: PNGファイル以外は指定できません`);
          continue;
        }

        try {
          const worldID = await getWorldIDFromFile(file);
          if (!worldID) {
            errors.push(`${file.name}: WorldIDが見つかりませんでした`);
            continue;
          }
          uniqueWorldIDs.add(worldID);
        } catch (err) {
          errors.push(`${file.name}: ${err}`);
        }
      }

      if (uniqueWorldIDs.size === 0) {
        setMessage(errors.length > 0 ? errors.join("\n") : "有効なWorldIDが見つかりませんでした。");
        return;
      }

      for (const worldID of uniqueWorldIDs) {
        openWorldPage(worldID);
      }

      if (errors.length > 0) {
        setMessage(
          `${uniqueWorldIDs.size}件のワールドURLを開きました。\n\n` + errors.join("\n")
        );
      } else {
        setMessage(`${uniqueWorldIDs.size}件のワールドURLを開きました。`);
      }
    });
  </script>
</body>
</html>
