<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VRC Open World Page</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f7f7;
    }

    #dropArea {
      width: 80%;
      max-width: 600px;
      padding: 48px 24px;
      text-align: center;
      border: 3px dashed #888;
      border-radius: 12px;
      background: white;
      color: #333;
      font-size: 20px;
      transition: 0.2s;
    }

    #dropArea.dragover {
      border-color: #0078d7;
      background: #eef6ff;
    }

    #message {
      margin-top: 16px;
      font-size: 14px;
      color: #666;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div>
    <div id="dropArea">ここにPNG画像をドラッグ＆ドロップ</div>
    <div id="message"></div>
  </div>

  <script>
    const VRCHAT_WORLD_URL_FORMAT = "https://vrchat.com/home/world/{}/info";
    const dropArea = document.getElementById("dropArea");
    const message = document.getElementById("message");

    function setMessage(text) {
      message.textContent = text;
    }

    function isPNGFile(file) {
      const isPngMime = file.type === "image/png";
      const isPngExt = file.name.toLowerCase().endsWith(".png");
      return isPngMime || isPngExt;
    }

    async function loadXMPFromPNG(file) {
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      let text = "";
      for (let i = 0; i < bytes.length; i++) {
        text += String.fromCharCode(bytes[i]);
      }

      const startTag = "<x:xmpmeta";
      const endTag = "</x:xmpmeta>";

      const start = text.indexOf(startTag);
      if (start === -1) {
        return null;
      }

      const end = text.indexOf(endTag, start);
      if (end === -1) {
        return null;
      }

      return text.slice(start, end + endTag.length);
    }

    function getWorldIDFromXMP(xmpString) {
      if (!xmpString) {
        return null;
      }

      const parser = new DOMParser();
      const xmlDoc = parser.parseFromString(xmpString, "application/xml");
      const parserError = xmlDoc.querySelector("parsererror");
      if (parserError) {
        return null;
      }

      const elements = xmlDoc.getElementsByTagName("*");
      for (const elem of elements) {
        const tagName = elem.tagName || "";
        if (tagName.endsWith("WorldID")) {
          return elem.textContent?.trim() || null;
        }
      }

      return null;
    }

    async function getWorldIDFromFile(file) {
      const xmpString = await loadXMPFromPNG(file);
      if (!xmpString) {
        return null;
      }
      return getWorldIDFromXMP(xmpString);
    }

    function openWorldPage(worldID) {
      const url = VRCHAT_WORLD_URL_FORMAT.replace("{}", worldID);
      window.open(url, "_blank", "noopener,noreferrer");
    }

    dropArea.addEventListener("dragover", (e) => {
      e.preventDefault();
      dropArea.classList.add("dragover");
      setMessage("");
    });

    dropArea.addEventListener("dragleave", () => {
      dropArea.classList.remove("dragover");
    });

    dropArea.addEventListener("drop", async (e) => {
      e.preventDefault();
      dropArea.classList.remove("dragover");

      const files = Array.from(e.dataTransfer.files);
      if (files.length === 0) {
        setMessage("ファイルがありません。");
        return;
      }

      const uniqueWorldIDs = new Set();
      const errors = [];

      for (const file of files) {
        if (!isPNGFile(file)) {
          errors.push(`${file.name}: PNGファイル以外は指定できません`);
          continue;
        }

        try {
          const worldID = await getWorldIDFromFile(file);
          if (!worldID) {
            errors.push(`${file.name}: WorldIDが見つかりませんでした`);
            continue;
          }
          uniqueWorldIDs.add(worldID);
        } catch (err) {
          errors.push(`${file.name}: ${err}`);
        }
      }

      if (uniqueWorldIDs.size === 0) {
        setMessage(errors.length > 0 ? errors.join("\n") : "有効なWorldIDが見つかりませんでした。");
        return;
      }

      for (const worldID of uniqueWorldIDs) {
        openWorldPage(worldID);
      }

      if (errors.length > 0) {
        setMessage(errors.join("\n"));
      } else {
        setMessage(`${uniqueWorldIDs.size}件のワールドURLを開きました。`);
      }
    });
  </script>
</body>
</html>
